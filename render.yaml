services:
  - type: web
    name: med-ml-backend
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false # We will set this manually for security
      - key: PYTHON_VERSION
        value: 3.12.1